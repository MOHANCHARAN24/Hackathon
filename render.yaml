services:
  - type: web
    name: campusai-backend
    runtime: docker
    plan: starter
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: campusai-persist
      mountPath: /app/persist
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_ENV
        value: production
      - key: STRICT_STARTUP_VALIDATION
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: SQLITE_DB_PATH
        value: /app/persist/feedback.db
      - key: CHROMA_PERSIST_PATH
        value: /app/persist/vectorstore
      - key: DOCS_PATH
        value: /app/docs

  - type: static
    name: campusai-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
